[env]
board = esp32-s3-devkitm-1
platform = espressif32@6.6.0
framework = arduino
monitor_speed = 115200
upload_speed = 921600
; board_build.filesystem = littlefs

lib_deps = 
    4-20ma/ModbusMaster@^2.0.1
    teckel12/NewPing@^1.9.7
    adafruit/Adafruit GFX Library@^1.12.5
    adafruit/Adafruit SH110X@^2.1.14
    adafruit/Adafruit SSD1306@^2.5.7
    https://github.com/me-no-dev/AsyncTCP.git
    https://github.com/me-no-dev/ESPAsyncWebServer.git

build_flags = 
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1

[env:ESP32S3]

[env:node]
build_flags =
    ${env.build_flags}
    -D ROLE_NODE_ESPNOW

[env:node1]
extends = env:node
build_flags =
    ${env:node.build_flags}
    -D ESP_NOW_NODE_ID=1

[env:node2]
extends = env:node
build_flags =
    ${env:node.build_flags}
    -D ESP_NOW_NODE_ID=2

[env:node3]
extends = env:node
build_flags =
    ${env:node.build_flags}
    -D ESP_NOW_NODE_ID=3

[env:node4]
extends = env:node
build_flags =
    ${env:node.build_flags}
    -D ESP_NOW_NODE_ID=4

[env:node5]
extends = env:node
build_flags =
    ${env:node.build_flags}
    -D ESP_NOW_NODE_ID=5

[env:node6]
extends = env:node
build_flags =
    ${env:node.build_flags}
    -D ESP_NOW_NODE_ID=6

[env:node7]
extends = env:node
build_flags =
    ${env:node.build_flags}
    -D ESP_NOW_NODE_ID=7

[env:node8]
extends = env:node
build_flags =
    ${env:node.build_flags}
    -D ESP_NOW_NODE_ID=8

[env:node9]
extends = env:node
build_flags =
    ${env:node.build_flags}
    -D ESP_NOW_NODE_ID=9

[env:node10]
extends = env:node
build_flags =
    ${env:node.build_flags}
    -D ESP_NOW_NODE_ID=10
    
[env:master]
build_flags =
    ${env.build_flags}
    -D ROLE_MASTER
